<script> var MY_MODEL_ID = '23b40b32f9954c8f9620867014f4d070'; var MY_AUDIO_FILE = './tio.mp4'; </script>
<!DOCTYPE html>
<html>
<head>
    <title>Sketchfab Bismarck Scene</title>
    <script src="https://sketchfab.com"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        iframe { width: 100vw; height: 100vh; border: 0; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1>Launch Bismarck Model</h1>
    <p>Click to start with audio</p>
</div>

<iframe src="" id="api-frame" allow="autoplay; fullscreen; vr"></iframe>

<!-- Hidden Video element used for Audio -->
<video id="bg-media" loop style="display:none;"></video>

<script>
    var iframe = document.getElementById('api-frame');
    var media = document.getElementById('bg-media');
    var overlay = document.getElementById('overlay');
    var client = new window.Sketchfab('1.12.1', iframe);

    // Set the source from the variable at the top
    media.src = MY_AUDIO_FILE;

    overlay.addEventListener('click', function() {
        overlay.style.display = 'none';

        client.init(MY_MODEL_ID, {
            success: function onSuccess(api) {
                api.start();
                api.addEventListener('viewerready', function() {
                    media.play().catch(e => console.log("Playback blocked:", e));
                });
            },
            autostart: 1,
            preload: 1
        });
    });
</script>
</body>
</html>
