<script> var MY_MODEL_ID = '23b40b32f9954c8f9620867014f4d070'; var MY_AUDIO_FILE = './tio.mp4'; </script>
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bismarck Experience</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .btn { padding: 20px 40px; background: #c00; color: #fff; font-weight: bold; border: none; border-radius: 8px; font-size: 1.5rem; }
        iframe { width: 100vw; height: 100vh; border: 0; display: none; }
    </style>
</head>
<body>

<div id="overlay" onclick="startApp()">
    <h1>Bismarck 3D</h1>
    <button class="btn">START WITH AUDIO</button>
</div>

<iframe src="" id="api-frame" allow="autoplay; fullscreen; vr"></iframe>
<video id="bg-media" loop playsinline style="display:none;"></video>

<!-- Alternate Script Source (CDN Mirror) -->
<script src="https://jsdelivr.net"></script>

<script>
    function startApp() {
        document.getElementById('overlay').style.display = 'none';
        var frame = document.getElementById('api-frame');
        frame.style.display = 'block';

        var media = document.getElementById('bg-media');
        media.src = MY_AUDIO_FILE;

        // Try initializing using the mirror script
        if (window.Sketchfab || window.SketchfabViewer) {
            var SketchfabConstructor = window.Sketchfab || window.SketchfabViewer;
            var client = new SketchfabConstructor('1.12.1', frame);
            
            client.init(MY_MODEL_ID, {
                success: function(api) {
                    api.start();
                    api.addEventListener('viewerready', function() {
                        media.play().catch(e => console.log("Audio Error:", e));
                    });
                },
                autostart: 1
            });
        } else {
            alert("STILL BLOCKED: Please disable your Ad-blocker for this site.");
        }
    }
</script>
</body>
</html>
